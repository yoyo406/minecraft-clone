<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Clone</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 24px;
      pointer-events: none;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      z-index: 10;
    }
    #hotbar {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2px;
      z-index: 10;
    }
    .hotbar-slot {
      width: 50px;
      height: 50px;
      border: 2px solid #555;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .hotbar-slot.selected {
      border-color: #fff;
      background: rgba(255, 255, 255, 0.2);
    }
    .hotbar-slot canvas {
      width: 40px;
      height: 40px;
      image-rendering: pixelated;
    }
    .hotbar-number {
      position: absolute;
      top: 2px;
      left: 4px;
      color: #aaa;
      font-size: 10px;
    }
    #debug {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 12px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      pointer-events: none;
      z-index: 10;
      line-height: 1.5;
    }
    #instructions {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      text-align: center;
      font-size: 16px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.7);
      padding: 40px;
      border-radius: 8px;
    }
    #instructions h1 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #4a4;
    }
    #instructions p {
      margin: 8px 0;
      color: #ccc;
    }
    #instructions .key {
      color: #ff0;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="crosshair">+</div>
    <div id="hotbar"></div>
    <div id="debug"></div>
    <div id="instructions">
      <h1>Minecraft Clone</h1>
      <p>Click to start playing</p>
      <p><span class="key">W A S D</span> — Move</p>
      <p><span class="key">Space</span> — Jump</p>
      <p><span class="key">Shift</span> — Sneak (slow)</p>
      <p><span class="key">Left Click</span> — Break block</p>
      <p><span class="key">Right Click</span> — Place block</p>
      <p><span class="key">1-9</span> — Select block</p>
      <p><span class="key">F3</span> — Toggle debug</p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
